; Multioto PHP overrides, loaded by the CLI SAPI that runs `php artisan serve`.
; Raised upload/runtime limits so large one-off imports (e.g. a full legacy
; ticket export CSV) go through instead of hitting the stock 2M/8M defaults.
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

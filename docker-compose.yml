# Multioto — full stack in one command:  docker compose up -d --build
# Brings up the app, queue worker, scheduler, PostgreSQL and Redis together.
services:
  app:
    build: .
    command: web
    ports:
      # Bind to localhost only. Docker's published-port iptables rules bypass
      # ufw, so 0.0.0.0 would expose the app to the internet regardless of the
      # firewall. A reverse proxy (Caddy on the docker network, or a host nginx
      # on 127.0.0.1) is what actually faces the world.
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DB_DATABASE: multioto
      DB_USERNAME: multioto
      DB_PASSWORD: multioto
    # Reach services that publish ports on the host (e.g. a separately-run WAHA
    # container) via http://host.docker.internal:<port>, since they're not on
    # this compose network. On Linux 'host-gateway' resolves to the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind .env so the app key generated on first boot persists on the host,
      # and mount storage so uploads/logs survive container rebuilds.
      - ./.env:/app/.env
      - storage:/app/storage
      # Shared with the host deploy watcher: the panel drops a deploy-request
      # flag here and reads back the version/status the watcher writes.
      - ./ops:/app/ops
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  queue:
    build: .
    command: queue
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DB_DATABASE: multioto
      DB_USERNAME: multioto
      DB_PASSWORD: multioto
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env
      - storage:/app/storage
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    build: .
    command: scheduler
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DB_DATABASE: multioto
      DB_USERNAME: multioto
      DB_PASSWORD: multioto
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env
      - storage:/app/storage
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: multioto
      POSTGRES_USER: multioto
      POSTGRES_PASSWORD: multioto
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  # Optional HTTPS reverse proxy for your domain (app.multidigital.co.il).
  # Enable with:  docker compose --profile proxy up -d
  # Caddy fetches a free Let's Encrypt certificate automatically once the
  # domain's DNS A record points at this server. Skip this service if the
  # server already has its own reverse proxy — just point it at app:8000.
  caddy:
    image: caddy:2
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:-app.multidigital.co.il}"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  storage:
  caddy_data:
  caddy_config:
